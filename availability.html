<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Availability</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f6fa;
      display: flex; flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      display: flex; align-items: center;
      padding: 0 28px; height: 52px;
      background: #fff; border-bottom: 1px solid #eaedf3;
      flex-shrink: 0; z-index: 10;
    }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; list-style: none; }
    .nav-links a {
      color: #555e7a; text-decoration: none; font-size: 0.82rem;
      padding: 6px 10px; border-radius: 6px; white-space: nowrap;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover  { color: #1a2044; background: #f0f1f8; }
    .nav-links a.active { color: #1a2044; font-weight: 600; background: #f0f1f8; }
    .nav-user { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #e8eaf6; border: 1.5px solid #c5cae9;
      display: flex; align-items: center; justify-content: center; color: #5c6bc0;
    }
    .avatar svg { width: 16px; height: 16px; }
    .user-name { font-size: 0.83rem; font-weight: 600; color: #1a2044; }
    .menu-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #8892aa; display: flex; align-items: center;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .menu-btn:hover { color: #1a2044; background: #f0f1f8; }
    .menu-btn svg { width: 18px; height: 18px; }
    .menu-wrap { position: relative; }
    .nav-dropdown { position: absolute; right: 0; top: calc(100% + 8px); background: #fff; border: 1px solid #eaedf3; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.13); min-width: 160px; z-index: 200; display: none; overflow: hidden; }
    .nav-dropdown.open { display: block; }
    .nav-dropdown a { display: flex; align-items: center; gap: 9px; padding: 10px 16px; font-size: 0.84rem; color: #374151; text-decoration: none; cursor: pointer; transition: background 0.12s; }
    .nav-dropdown a:hover { background: #f9fafb; }
    .nav-dropdown a svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .dd-divider { height: 1px; background: #f0f2f7; margin: 4px 0; }
    .dd-logout { color: #ef4444 !important; }
    .dd-logout:hover { background: #fef2f2 !important; }

    /* ── Page ── */
    .page { flex: 1; padding: 28px 32px; max-width: 960px; width: 100%; margin: 0 auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-radius: 14px; padding: 18px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
      margin-bottom: 20px;
      animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    .page-header-left { display: flex; align-items: center; gap: 14px; }
    .icon-box {
      width: 46px; height: 46px; border-radius: 12px; background: #0d9488;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(13,148,136,0.3); flex-shrink: 0;
    }
    .icon-box svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .page-header-title h1 { font-size: 1.18rem; font-weight: 700; color: #1a2044; }
    .page-header-title p  { font-size: 0.8rem; color: #8892aa; margin-top: 2px; }
    .header-stats { display: flex; gap: 8px; }
    .hstat {
      font-size: 0.75rem; font-weight: 500; padding: 5px 12px;
      border-radius: 20px; border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280;
    }
    .hstat strong { color: #1a2044; }

    /* ── Filter pills ── */
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 20px;
      animation: fadeUp 0.4s 0.05s cubic-bezier(0.22,1,0.36,1) both;
    }
    .filter-pill {
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
      border: 1px solid #e5e7eb; background: #fff; color: #6b7280;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-pill:hover  { border-color: #0d9488; color: #0d9488; background: #f0fafa; }
    .filter-pill.active { border-color: #0d9488; background: #0d9488; color: #fff; }

    /* ── Employee grid ── */
    .emp-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      animation: fadeUp 0.4s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Employee card ── */
    .emp-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
      display: flex; flex-direction: column;
    }
    .emp-card.pending { opacity: 0.85; }

    .card-head {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid #f3f4f6;
    }
    .emp-av {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .emp-info { flex: 1; min-width: 0; }
    .emp-name { font-size: 0.9rem; font-weight: 700; color: #1a2044; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .role-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 20px; margin-top: 3px;
    }
    .role-fulltime { background: #dbeafe; color: #1d4ed8; }
    .role-parttime { background: #fef3c7; color: #92400e; }
    .role-vacation { background: #fee2e2; color: #b91c1c; }

    .sub-status {
      font-size: 0.68rem; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .ss-submitted { background: #dcfce7; color: #15803d; }
    .ss-pending   { background: #fef9c3; color: #854d0e; }
    .ss-vacation  { background: #f3f4f6; color: #6b7280; }

    /* Day list */
    .card-body { padding: 14px 20px; flex: 1; }

    .day-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid #f9fafb;
    }
    .day-row:last-child { border-bottom: none; }
    .day-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .day-name { font-size: 0.82rem; font-weight: 600; color: #374151; width: 88px; flex-shrink: 0; }
    .day-time { font-size: 0.8rem; color: #6b7280; }
    .allday-pill {
      font-size: 0.67rem; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; background: #f0fafa; color: #0d9488;
      border: 1px solid #ccfbf1;
    }

    /* No availability state */
    .no-avail {
      display: flex; flex-direction: column; align-items: center;
      padding: 22px 0; color: #c4c9d4; text-align: center;
    }
    .no-avail svg { width: 32px; height: 32px; stroke: #dde1ea; fill: none; stroke-width: 1.5; stroke-linecap: round; margin-bottom: 8px; }
    .no-avail p { font-size: 0.82rem; font-weight: 500; color: #b0b8cc; }

    /* Notes */
    .card-notes {
      margin: 10px 0 2px;
      font-size: 0.77rem; color: #6b7280; font-style: italic;
      padding-top: 10px; border-top: 1px solid #f3f4f6;
    }

    /* Card footer */
    .card-footer {
      padding: 10px 20px; border-top: 1px solid #f3f4f6;
      font-size: 0.72rem; color: #9ca3af;
      display: flex; align-items: center; gap: 6px;
    }
    .card-footer svg { width: 12px; height: 12px; stroke: #c4c9d4; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* No results */
    .no-results {
      grid-column: 1 / -1; background: #fff; border-radius: 14px;
      padding: 60px 20px; text-align: center; color: #b0b8cc;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .no-results svg { width: 48px; height: 48px; stroke: #d1d8e8; fill: none; stroke-width: 1.5; stroke-linecap: round; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; }
    .no-results p { font-size: 0.88rem; font-weight: 500; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="availability.html" class="active">Availability</a></li>
    <li><a href="timesheet.html">Timesheet</a></li>
    <li><a href="checklist.html">Checklist</a></li>
    <li><a href="notifications.html">Notifications</a></li>
    <li><a href="incident.html">Incident Form</a></li>
  </ul>
  <div class="nav-user">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
    <span class="user-name" id="displayName">Manager</span>
    <div class="menu-wrap" id="menuWrap">
      <button class="menu-btn" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
      <div class="nav-dropdown" id="navDropdown">
        <a class="dd-logout" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
      </div>
    </div>
  </div>
</nav>

<div class="page">

  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="page-header-title">
        <h1>Availability</h1>
        <p>Weekly availability submitted by your employees</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat"><strong id="statTotal">5</strong> employees</div>
      <div class="hstat"><strong id="statSubmitted" style="color:#15803d">3</strong> submitted</div>
      <div class="hstat"><strong id="statPending" style="color:#854d0e">2</strong> pending</div>
    </div>
  </div>

  <!-- Filter pills -->
  <div class="filter-row">
    <button class="filter-pill active" onclick="setFilter('all')"       id="fAll">All (5)</button>
    <button class="filter-pill"        onclick="setFilter('submitted')" id="fSubmitted">Submitted (3)</button>
    <button class="filter-pill"        onclick="setFilter('pending')"   id="fPending">Pending (2)</button>
  </div>

  <!-- Employee grid -->
  <div class="emp-grid" id="empGrid"></div>

</div>

<script>
  if (!sessionStorage.getItem('loggedIn')) { window.location.replace('login.html'); }
  const stored = sessionStorage.getItem('userName');
  if (stored) document.getElementById('displayName').textContent = stored;
  function toggleMenu() { document.getElementById('navDropdown').classList.toggle('open'); }
  function logout() { sessionStorage.clear(); window.location.replace('login.html'); }
  document.addEventListener('click', e => {
    const w = document.getElementById('menuWrap');
    if (w && !w.contains(e.target)) document.getElementById('navDropdown').classList.remove('open');
  });

  // ── Data ──
  const EMPLOYEES = [
    { id:1, name:'Sarah Johnson',  initials:'SJ', color:'#3b82f6', role:'Full-time' },
    { id:2, name:'Michael Chen',   initials:'MC', color:'#f59e0b', role:'Part-time' },
    { id:3, name:'Emily Davis',    initials:'ED', color:'#10b981', role:'Full-time' },
    { id:4, name:'James Wilson',   initials:'JW', color:'#8b5cf6', role:'Part-time' },
    { id:5, name:'Aiko Tanaka',    initials:'AT', color:'#ef4444', role:'Vacation'  },
  ];

  const AVAILABILITY = [
    {
      empId: 1, submitted: true, submittedAt: 'Mar 28, 2026',
      days: [
        { name:'Tuesday',   startTime:'09:00', endTime:'17:00', allDay:false },
        { name:'Wednesday', startTime:'09:00', endTime:'17:00', allDay:false },
        { name:'Thursday',  startTime:'09:00', endTime:'17:00', allDay:false },
        { name:'Friday',    startTime:'11:00', endTime:'19:00', allDay:false },
        { name:'Saturday',  startTime:'10:00', endTime:'15:00', allDay:false },
      ],
      notes: 'Prefer morning shifts when possible.'
    },
    {
      empId: 2, submitted: true, submittedAt: 'Mar 29, 2026',
      days: [
        { name:'Tuesday',  startTime:'14:00', endTime:'21:00', allDay:false },
        { name:'Thursday', startTime:'14:00', endTime:'21:00', allDay:false },
        { name:'Saturday', startTime:'09:00', endTime:'17:00', allDay:false },
      ],
      notes: ''
    },
    {
      empId: 3, submitted: true, submittedAt: 'Apr 1, 2026',
      days: [
        { name:'Tuesday',   startTime:'', endTime:'', allDay:true },
        { name:'Wednesday', startTime:'', endTime:'', allDay:true },
        { name:'Friday',    startTime:'08:00', endTime:'16:00', allDay:false },
        { name:'Saturday',  startTime:'08:00', endTime:'16:00', allDay:false },
      ],
      notes: 'Available for on-call shifts any day of the week.'
    },
    { empId:4, submitted:false, submittedAt:null, days:[], notes:'' },
    { empId:5, submitted:false, submittedAt:null, days:[], notes:'' },
  ];

  // ── State ──
  let currentFilter = 'all';

  function setFilter(f) {
    currentFilter = f;
    document.getElementById('fAll').classList.toggle('active',       f === 'all');
    document.getElementById('fSubmitted').classList.toggle('active', f === 'submitted');
    document.getElementById('fPending').classList.toggle('active',   f === 'pending');
    buildGrid();
  }

  // ── Format time ──
  function fmtTime(val) {
    if (!val) return '';
    const [h, m] = val.split(':').map(Number);
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  // ── Build grid ──
  function buildGrid() {
    const grid = document.getElementById('empGrid');
    grid.innerHTML = '';

    const visible = EMPLOYEES.filter(emp => {
      const avail = AVAILABILITY.find(a => a.empId === emp.id);
      if (currentFilter === 'submitted') return avail?.submitted;
      if (currentFilter === 'pending')   return !avail?.submitted;
      return true;
    });

    if (visible.length === 0) {
      grid.innerHTML = `
        <div class="no-results">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <p>No employees match this filter</p>
        </div>`;
      return;
    }

    visible.forEach(emp => {
      const avail = AVAILABILITY.find(a => a.empId === emp.id);
      const isVac = emp.role === 'Vacation';
      const hasSub = avail?.submitted;

      const roleClass = emp.role === 'Full-time' ? 'role-fulltime'
                      : emp.role === 'Part-time' ? 'role-parttime'
                      : 'role-vacation';

      let statusClass, statusLabel;
      if (isVac)       { statusClass = 'ss-vacation';  statusLabel = 'On Vacation'; }
      else if (hasSub) { statusClass = 'ss-submitted'; statusLabel = 'Submitted';   }
      else             { statusClass = 'ss-pending';   statusLabel = 'Pending';     }

      // Day rows
      let bodyHtml = '';
      if (isVac) {
        bodyHtml = `
          <div class="no-avail">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <p>Employee is on vacation</p>
          </div>`;
      } else if (!hasSub || avail.days.length === 0) {
        bodyHtml = `
          <div class="no-avail">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p>No availability submitted yet</p>
          </div>`;
      } else {
        const rows = avail.days.map(d => `
          <div class="day-row">
            <div class="day-dot" style="background:${emp.color}"></div>
            <span class="day-name">${d.name}</span>
            ${d.allDay
              ? `<span class="allday-pill">All day</span>`
              : `<span class="day-time">${fmtTime(d.startTime)} – ${fmtTime(d.endTime)}</span>`
            }
          </div>`).join('');

        const notes = avail.notes
          ? `<div class="card-notes">"${avail.notes}"</div>`
          : '';

        bodyHtml = rows + notes;
      }

      const footer = hasSub && avail.submittedAt
        ? `<div class="card-footer">
             <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
             Submitted ${avail.submittedAt}
           </div>`
        : `<div class="card-footer">Awaiting submission</div>`;

      const card = document.createElement('div');
      card.className = 'emp-card' + (!hasSub ? ' pending' : '');
      card.innerHTML = `
        <div class="card-head">
          <div class="emp-av" style="background:${emp.color}">${emp.initials}</div>
          <div class="emp-info">
            <div class="emp-name">${emp.name}</div>
            <span class="role-badge ${roleClass}">${emp.role}</span>
          </div>
          <span class="sub-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="card-body">${bodyHtml}</div>
        ${footer}`;

      grid.appendChild(card);
    });
  }

  // ── Bootstrap ──
  buildGrid();
</script>

</body>
</html>
