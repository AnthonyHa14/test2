<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a2044;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 28px;
      height: 52px;
      background: #111830;
      flex-shrink: 0;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      background: #fff;
      border-radius: 8px;
      margin-right: 24px;
      flex-shrink: 0;
    }

    .nav-logo svg {
      width: 20px;
      height: 20px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }

    .nav-btn-outline {
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
    }

    .nav-btn-outline:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
    }

    .nav-btn-solid {
      border: none;
      background: #1e2a4a;
      color: #fff;
    }

    .nav-btn-solid:hover { background: #263460; }

    /* ── Background scene ── */
    .scene {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Golden decorative circle (left) */
    .deco {
      position: absolute;
      left: -80px;
      top: 50%;
      transform: translateY(-50%);
      width: 420px;
      height: 420px;
      pointer-events: none;
    }

    .deco-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(212,175,55,0.25);
    }

    .deco-ring:nth-child(2) { inset: 30px; border-color: rgba(212,175,55,0.3); }
    .deco-ring:nth-child(3) { inset: 60px; border-color: rgba(212,175,55,0.2); }

    /* Petal shapes */
    .petals {
      position: absolute;
      inset: 60px;
    }

    .petal {
      position: absolute;
      width: 90px;
      height: 130px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(160deg, #c9a227 0%, #8b6914 60%, #5a430d 100%);
      opacity: 0.75;
      transform-origin: center bottom;
    }

    .petal:nth-child(1) { left: 50%; top: 50%; transform: translateX(-50%) rotate(0deg)   translateY(-100%); }
    .petal:nth-child(2) { left: 50%; top: 50%; transform: translateX(-50%) rotate(60deg)  translateY(-100%); }
    .petal:nth-child(3) { left: 50%; top: 50%; transform: translateX(-50%) rotate(120deg) translateY(-100%); }
    .petal:nth-child(4) { left: 50%; top: 50%; transform: translateX(-50%) rotate(180deg) translateY(-100%); }
    .petal:nth-child(5) { left: 50%; top: 50%; transform: translateX(-50%) rotate(240deg) translateY(-100%); }
    .petal:nth-child(6) { left: 50%; top: 50%; transform: translateX(-50%) rotate(300deg) translateY(-100%); }

    /* Stem lines on petals */
    .petal::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 10%;
      width: 1px;
      height: 80%;
      background: rgba(0,0,0,0.25);
      transform: translateX(-50%);
    }

    .deco-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, #e8c84a, #8b6914);
    }

    /* Brand name text in background */
    .brand-text {
      position: absolute;
      right: 12%;
      top: 50%;
      transform: translateY(-50%);
      text-align: left;
      pointer-events: none;
      user-select: none;
    }

    .brand-text .line1 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #c9a227;
      opacity: 0.35;
      line-height: 1;
    }

    .brand-text .line2 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #c9a227;
      opacity: 0.35;
      line-height: 1;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 360px;
      padding: 36px 32px 32px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.2);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a2044;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }

    /* Inputs */
    input {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d8dce8;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    input::placeholder { color: #aab0c4; }

    input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 3px rgba(45,212,191,0.15);
    }

    /* Forgot */
    .forgot {
      display: block;
      text-align: center;
      font-size: 0.8rem;
      color: #8892aa;
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 0.15s;
    }

    .forgot:hover { color: #1a2044; }

    /* Sign In button */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #2dd4bf 0%, #06b6d4 100%);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: filter 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(6,182,212,0.4);
      margin-bottom: 20px;
    }

    .btn:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(6,182,212,0.5);
    }

    .btn:active { transform: translateY(0); filter: brightness(0.97); }

    /* Footer */
    .card-footer {
      text-align: center;
      font-size: 0.82rem;
      color: #8892aa;
    }

    .card-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <ul class="nav-links">
      <li><a href="#">Schedule</a></li>
      <li><a href="availability.html">Availability</a></li>
      <li><a href="#">Timesheet</a></li>
      <li><a href="#">Checklist</a></li>
      <li><a href="#">Notifications</a></li>
      <li><a href="#">Incident Form</a></li>
    </ul>

    <div class="nav-actions">
      <a href="login.html" class="nav-btn nav-btn-outline">Sign In</a>
      <a href="register.html" class="nav-btn nav-btn-solid">Register</a>
    </div>
  </nav>

  <!-- Main scene -->
  <div class="scene">

    <!-- Decorative golden flower -->
    <div class="deco">
      <div class="deco-ring"></div>
      <div class="deco-ring"></div>
      <div class="deco-ring"></div>
      <div class="petals">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
      </div>
      <div class="deco-center"></div>
    </div>

    <!-- Background brand name -->
    <div class="brand-text">
      <div class="line1">AIKAWA</div>
      <div class="line2">SUSHI</div>
    </div>

    <!-- Login card -->
    <div class="card">
      <h1>Sign In</h1>

      <form onsubmit="handleSubmit(event)" novalidate>
        <input type="email"    id="email"    placeholder="Your email"    autocomplete="email"            required />
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required />

        <p id="loginErr" style="display:none;margin:0 0 10px;font-size:0.82rem;color:#dc2626;text-align:center;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;">
          Incorrect email or password. Please try again.
        </p>

        <a href="#" class="forgot">Forgot Password?</a>

        <button type="submit" class="btn" id="loginBtn">Sign In</button>
      </form>

      <p class="card-footer">Don't have an account? <a href="register.html">Register</a></p>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const emailEl = document.getElementById('email');
      const passEl  = document.getElementById('password');
      const errEl   = document.getElementById('loginErr');
      const btn     = document.getElementById('loginBtn');

      const enteredEmail = emailEl.value.trim().toLowerCase();
      const enteredPass  = passEl.value;

      // Retrieve registered credentials from localStorage
      const savedEmail = localStorage.getItem('reg_email');
      const savedPass  = localStorage.getItem('reg_password');
      const savedName  = localStorage.getItem('reg_name');

      // Validate credentials (User.login)
      const valid = savedEmail && savedPass
        ? (enteredEmail === savedEmail && enteredPass === savedPass)
        : false;

      if (!valid) {
        errEl.style.display = 'block';
        emailEl.style.borderColor = '#fca5a5';
        passEl.style.borderColor  = '#fca5a5';
        passEl.value = '';
        return;
      }

      // Credentials match — clear any error and sign in
      errEl.style.display = 'none';
      emailEl.style.borderColor = '';
      passEl.style.borderColor  = '';

      btn.textContent = 'Signing in…';
      btn.disabled    = true;
      btn.style.opacity = '0.75';

      // Use the registered full name, fallback to part before @
      const displayName = savedName || (enteredEmail.split('@')[0].charAt(0).toUpperCase() + enteredEmail.split('@')[0].slice(1));
      sessionStorage.setItem('userName', displayName);
      sessionStorage.setItem('loggedIn', 'true');

      setTimeout(() => { window.location.href = 'home.html'; }, 1000);
    }

    // Clear red borders when user starts retyping
    document.getElementById('email').addEventListener('input', () => {
      document.getElementById('email').style.borderColor = '';
      document.getElementById('loginErr').style.display  = 'none';
    });
    document.getElementById('password').addEventListener('input', () => {
      document.getElementById('password').style.borderColor = '';
      document.getElementById('loginErr').style.display     = 'none';
    });
  </script>

</body>
</html>
